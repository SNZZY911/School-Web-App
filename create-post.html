<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Post – School Web App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-wrap">
    <div class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="breadcrumb">
        <a href="dashboard.html">Dashboard</a>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">Create Post</span>
      </nav>
    </div>

    <div class="page-content">
      <div class="max-2xl">
        <div style="max-width:640px">
          <h1 class="page-title">Create Post</h1>

          <div class="card" style="margin-top:16px">
            <div class="card-content">
              <form id="postForm" onsubmit="handleSubmit(event)">

                <!-- Group -->
                <div class="form-field">
                  <label class="form-label" for="groupSelect">Group <span class="required">*</span></label>
                  <select class="input" id="groupSelect" required>
                    <option value="">Select a group…</option>
                    <option value="1">Grade 1-A – Mathematics</option>
                    <option value="2">Grade 2-B – Science</option>
                    <option value="3">Grade 3-C – English</option>
                    <option value="4">Grade 4-D – Filipino</option>
                    <option value="5">Grade 5-E – TLE</option>
                  </select>
                </div>

                <!-- Content -->
                <div class="form-field">
                  <label class="form-label" for="postContent">Content <span class="required">*</span></label>
                  <textarea class="input textarea" id="postContent" rows="5" placeholder="What's on your mind?" required></textarea>
                </div>

                <!-- Announcement toggle (teacher/admin only) -->
                <div class="form-field announcement-row hidden" id="announcementRow">
                  <label class="checkbox-label">
                    <input type="checkbox" id="isAnnouncement" class="checkbox" />
                    <div>
                      <div style="font-size:13px;font-weight:500">Mark as Announcement</div>
                      <div class="text-muted" style="font-size:12px">Announcements are pinned to the top of the feed for all members.</div>
                    </div>
                  </label>
                </div>

                <!-- File attachment (cosmetic) -->
                <div class="form-field">
                  <label class="form-label">Attach File <span class="optional">(optional)</span></label>
                  <div class="file-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px;color:var(--muted-fg)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p class="file-drop-text">Click to browse or drag &amp; drop</p>
                    <p class="file-drop-sub">PNG, JPG, PDF up to 10 MB</p>
                  </div>
                  <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" />
                  <div id="filePreview" class="hidden" style="margin-top:8px"></div>
                </div>

                <!-- Error -->
                <div id="formError" class="alert alert-error hidden" style="margin-bottom:12px"></div>

                <!-- Actions -->
                <div class="flex gap-2 justify-end" style="margin-top:8px">
                  <a href="dashboard.html" class="btn btn-outline">Cancel</a>
                  <button type="submit" class="btn btn-primary" id="submitBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    Publish Post
                  </button>
                </div>

              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
requireAuth();
const user = getUser();

const groupNames = {
  '1':'Grade 10-A – Mathematics',
  '2':'Grade 10-A – Science',
  '3':'Grade 10-A – English',
  '4':'Grade 10-A – Filipino',
  '5':'Grade 10-A – TLE',
};

// Show announcement checkbox for admin/moderator
if (user.role === 'admin' || user.role === 'moderator') {
  document.getElementById('announcementRow').classList.remove('hidden');
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const preview = document.getElementById('filePreview');
  preview.classList.remove('hidden');
  preview.innerHTML = `
    <div class="file-chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      ${esc(file.name)}
      <button type="button" onclick="clearFile()" style="margin-left:6px;line-height:1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
}
function clearFile() {
  document.getElementById('fileInput').value = '';
  const p = document.getElementById('filePreview');
  p.classList.add('hidden');
  p.innerHTML = '';
}

function handleSubmit(e) {
  e.preventDefault();
  const groupId = document.getElementById('groupSelect').value;
  const content = document.getElementById('postContent').value.trim();
  const isAnnouncement = document.getElementById('isAnnouncement')?.checked || false;

  const errEl = document.getElementById('formError');
  errEl.classList.add('hidden');

  if (!groupId) { showError('Please select a group.'); return; }
  if (!content) { showError('Post content cannot be empty.'); return; }
  if (content.length < 5) { showError('Post content is too short (minimum 5 characters).'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Publishing…';

  // Simulate async save
  setTimeout(() => {
    const posts = JSON.parse(localStorage.getItem('demo_posts') || '[]');
    const newPost = {
      id: Date.now(),
      author: user.name,
      author_role: user.role,
      group: groupNames[groupId],
      group_id: parseInt(groupId),
      section: 'A',
      content,
      is_announcement: isAnnouncement,
      likes: 0,
      liked_by: [],
      comments: [],
      status: 'approved',
      created_at: new Date().toISOString(),
    };
    posts.unshift(newPost);
    localStorage.setItem('demo_posts', JSON.stringify(posts));
    location.href = 'dashboard.html';
  }, 600);
}

function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent = msg;
  el.classList.remove('hidden');
}
</script>
</body>
</html>
